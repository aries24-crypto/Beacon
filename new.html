  <script type="text/babel">
    const { useEffect, useRef, useState } = React;

    // Robust resolution of window.Motion/FramerMotion to completely eliminate initialization errors
    const MotionLib = window.Motion || window.FramerMotion || { motion: {}, AnimatePresence: React.Fragment };
    const { motion, AnimatePresence } = MotionLib;

    // Suppress benign Framer Motion React warnings in browser console 
    const originalError = console.error;
    console.error = (...args) => {
      if (args[0] && args[0].includes('Framer Motion')) return;
      originalError(...args);
    };

    // FadingVideo Component
    // Custom requestAnimationFrame crossfade, avoiding CSS transition dependencies
    function FadingVideo({ src, className, style }) {
      const videoRef = useRef(null);
      const rafIdRef = useRef(null);
      const fadingOutRef = useRef(false);

      const FADE_MS = 500;
      const FADE_OUT_LEAD = 0.55; // seconds before end to start fade out

      // custom fadeTo using requestAnimationFrame reading directly from element style opacity
      const fadeTo = (targetOpacity, duration) => {
        if (!videoRef.current) return;
        
        // Cancel any pending animations first
        if (rafIdRef.current) {
          cancelAnimationFrame(rafIdRef.current);
        }

        const video = videoRef.current;
        const startOpacity = parseFloat(video.style.opacity) || 0;
        const startTime = performance.now();

        const updateFade = (now) => {
          const elapsed = now - startTime;
          const progress = Math.min(elapsed / duration, 1);
          
          // Cubic easing for natural fade visual
          const easeProgress = progress * progress * (3 - 2 * progress);
          const currentOpacity = startOpacity + (targetOpacity - startOpacity) * easeProgress;
          
          if (video) {
            video.style.opacity = currentOpacity;
          }

          if (progress < 1) {
            rafIdRef.current = requestAnimationFrame(updateFade);
          } else {
            rafIdRef.current = null;
          }
        };

        rafIdRef.current = requestAnimationFrame(updateFade);
      };

      useEffect(() => {
        const video = videoRef.current;
        if (!video) return;

        // Initialize element styling
        video.style.opacity = '0';

        const handleLoadedData = () => {
          if (video) {
            video.style.opacity = '0';
            video.play().catch(err => console.log("Video auto-play deferred:", err));
            fadeTo(1, FADE_MS);
          }
        };

        const handleTimeUpdate = () => {
          if (!video) return;
          const remaining = video.duration - video.currentTime;
          
          // Trigger fade out at exactly FADE_OUT_LEAD duration before ending
          if (!fadingOutRef.current && remaining <= FADE_OUT_LEAD && remaining > 0) {
            fadingOutRef.current = true;
            fadeTo(0, FADE_MS);
          }
        };

        const handleEnded = () => {
          if (!video) return;
          // Set to complete zero
          video.style.opacity = '0';
          
          setTimeout(() => {
            if (video) {
              video.currentTime = 0;
              video.play().then(() => {
                fadingOutRef.current = false;
                fadeTo(1, FADE_MS);
              }).catch(err => {
                console.log("Replay attempt deferred", err);
              });
            }
          }, 100);
        };

        // Attach native listeners
        video.addEventListener('loadeddata', handleLoadedData);
        video.addEventListener('timeupdate', handleTimeUpdate);
        video.addEventListener('ended', handleEnded);

        // Backup play trigger if already loaded
        if (video.readyState >= 2) {
          handleLoadedData();
        }

        return () => {
          if (rafIdRef.current) {
            cancelAnimationFrame(rafIdRef.current);
          }
          if (video) {
            video.removeEventListener('loadeddata', handleLoadedData);
            video.removeEventListener('timeupdate', handleTimeUpdate);
            video.removeEventListener('ended', handleEnded);
          }
        };
      }, [src]);

      return (
        <video
          ref={videoRef}
          src={src}
          className={className}
          style={{ ...style, transition: 'none' }}
          autoPlay
          muted
          playsInline
          preload="auto"
        />
      );
    }

    // BlurText Component
    // Splits text by spaces and blurs each word individually using IntersectionObserver trigger
    function BlurText({ text, className }) {
      const containerRef = useRef(null);
      const [isVisible, setIsVisible] = useState(false);

      useEffect(() => {
        const observer = new IntersectionObserver(
          ([entry]) => {
            if (entry.isIntersecting) {
              setIsVisible(true);
            }
          },
          { threshold: 0.1 }
        );

        if (containerRef.current) {
          observer.observe(containerRef.current);
        }

        return () => {
          if (containerRef.current) {
            observer.unobserve(containerRef.current);
          }
        };
      }, []);

      const words = text.split(" ");

      return (
        <p
          ref={containerRef}
          className={className}
          style={{ display: "flex", flexWrap: "wrap", justifyContent: "center", rowGap: "0.1em" }}
        >
          {words.map((word, i) => {
            const delay = i * 0.1; // delay = (i * 100) / 1000 seconds
            
            return (
              <motion.span
                key={i}
                initial={{ filter: 'blur(10px)', opacity: 0, y: 50 }}
                animate={isVisible ? {
                  filter: ['blur(10px)', 'blur(5px)', 'blur(0px)'],
                  opacity: [0, 0.5, 1],
                  y: [50, -5, 0]
                } : {}}
                transition={{
                  duration: 0.7,
                  times: [0, 0.5, 1],
                  ease: "easeOut",
                  delay: delay
                }}
                style={{
                  display: "inline-block",
                  marginRight: "0.28em"
                }}
              >
                {word}
              </motion.span>
            );
          })}
        </p>
      );
    }
